name: hardening-audit

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Secret scan
        run: python scripts/secret_scan.py

      - name: Complexity budget check
        run: python scripts/check_complexity.py

      - name: Generate file audit matrix
        run: python scripts/generate_file_audit_matrix.py

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verification-artifacts
          path: artifacts/verification/
